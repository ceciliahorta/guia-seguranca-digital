<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#fdf3e3"/>

  <!-- Shield (protection, left side) -->
  <path d="M100 55 L155 82 L155 152 Q155 190 100 212 Q45 190 45 152 L45 82 Z" fill="#2d9d78"/>
  <path d="M100 72 L140 94 L140 152 Q140 182 100 200 Q60 182 60 152 L60 94 Z" fill="#e8f7f2"/>
  <path d="M82 140 L95 153 L120 122" stroke="#2d9d78" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Unknown person silhouette (right) -->
  <circle cx="270" cy="105" r="42" fill="#e08a2c" opacity="0.18"/>
  <circle cx="270" cy="95" r="26" fill="#94a3b8"/>
  <path d="M232 145 Q232 125 270 125 Q308 125 308 145" fill="#94a3b8"/>

  <!-- Question marks -->
  <text x="264" y="102" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">?</text>

  <!-- Chat bubble with warning -->
  <g transform="translate(270,195)">
    <rect x="-54" y="-30" width="108" height="52" rx="12" fill="#e08a2c"/>
    <polygon points="-14,22 -30,40 8,22" fill="#e08a2c"/>
    <text x="0" y="0" font-size="22" text-anchor="middle" font-family="Arial">⚠️</text>
    <text x="0" y="16" font-size="11" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Desconhecido!</text>
  </g>

  <!-- Lock chain connecting shield to scene -->
  <line x1="155" y1="134" x2="228" y2="134" stroke="#2d9d78" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.5"/>
  <circle cx="185" cy="134" r="5" fill="#2d9d78" opacity="0.5"/>
  <circle cx="200" cy="134" r="5" fill="#2d9d78" opacity="0.5"/>
  <circle cx="215" cy="134" r="5" fill="#2d9d78" opacity="0.5"/>
</svg>
