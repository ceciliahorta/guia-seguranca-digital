<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#fdf3e3"/>

  <!-- Padlock body -->
  <rect x="148" y="148" width="104" height="88" rx="14" fill="#e08a2c"/>
  <rect x="158" y="158" width="84" height="68" rx="10" fill="#fbe6c4"/>
  <!-- Shackle -->
  <path d="M170 148 L170 118 Q170 90 200 90 Q230 90 230 118 L230 148" stroke="#e08a2c" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M170 148 L170 118 Q170 90 200 90 Q230 90 230 118 L230 148" stroke="#fbe6c4" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Keyhole -->
  <circle cx="200" cy="184" r="13" fill="#e08a2c"/>
  <rect x="196" y="184" width="8" height="16" rx="4" fill="#e08a2c"/>

  <!-- Key (left) -->
  <g transform="translate(82,100) rotate(-35)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#e08a2c" stroke-width="8"/>
    <circle cx="0" cy="0" r="9" fill="#fdf3e3" stroke="#e08a2c" stroke-width="3"/>
    <line x1="20" y1="0" x2="65" y2="0" stroke="#e08a2c" stroke-width="8" stroke-linecap="round"/>
    <line x1="50" y1="0" x2="50" y2="14" stroke="#e08a2c" stroke-width="6" stroke-linecap="round"/>
    <line x1="63" y1="0" x2="63" y2="11" stroke="#e08a2c" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Stars (security strength) -->
  <text x="296" y="92"  font-size="28" fill="#e08a2c" font-family="Arial">★</text>
  <text x="322" y="122" font-size="22" fill="#e08a2c" font-family="Arial" opacity="0.7">★</text>
  <text x="305" y="148" font-size="16" fill="#e08a2c" font-family="Arial" opacity="0.4">★</text>

  <!-- 2FA badge -->
  <rect x="276" y="185" width="88" height="36" rx="10" fill="#e08a2c"/>
  <text x="320" y="208" font-size="15" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">2FA ✓</text>

  <!-- Check circle (bottom-left) -->
  <circle cx="85" cy="210" r="22" fill="#2d9d78"/>
  <path d="M74 210 L81 218 L97 200" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
