<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#f0ebfa"/>

  <!-- Large eye -->
  <path d="M60 140 Q200 30 340 140 Q200 250 60 140 Z" fill="white" stroke="#7c5cbf" stroke-width="4"/>
  <circle cx="200" cy="140" r="48" fill="#7c5cbf" opacity="0.2"/>
  <circle cx="200" cy="140" r="36" fill="#7c5cbf" opacity="0.4"/>
  <circle cx="200" cy="140" r="24" fill="#7c5cbf"/>
  <circle cx="209" cy="132" r="7" fill="white" opacity="0.5"/>

  <!-- Lock overlaying the eye -->
  <rect x="178" y="152" width="44" height="34" rx="7" fill="#7c5cbf"/>
  <path d="M186 152 L186 138 Q186 122 200 122 Q214 122 214 138 L214 152" stroke="#7c5cbf" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Lock shackle lighter -->
  <path d="M186 152 L186 138 Q186 122 200 122 Q214 122 214 138 L214 152" stroke="#c9b8f0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="169" r="5" fill="#f0ebfa"/>

  <!-- Digital footprints below -->
  <ellipse cx="120" cy="240" rx="14" ry="8" fill="#7c5cbf" opacity="0.25" transform="rotate(-20,120,240)"/>
  <ellipse cx="145" cy="255" rx="10" ry="6" fill="#7c5cbf" opacity="0.2" transform="rotate(15,145,255)"/>
  <ellipse cx="168" cy="244" rx="14" ry="8" fill="#7c5cbf" opacity="0.25" transform="rotate(-10,168,244)"/>
  <ellipse cx="194" cy="257" rx="10" ry="6" fill="#7c5cbf" opacity="0.2" transform="rotate(12,194,257)"/>
  <ellipse cx="218" cy="245" rx="14" ry="8" fill="#7c5cbf" opacity="0.25" transform="rotate(-15,218,245)"/>
  <ellipse cx="243" cy="256" rx="10" ry="6" fill="#7c5cbf" opacity="0.2" transform="rotate(10,243,256)"/>
  <ellipse cx="268" cy="244" rx="14" ry="8" fill="#7c5cbf" opacity="0.2" transform="rotate(-12,268,244)"/>

  <!-- Privacy tag (top-right) -->
  <rect x="280" y="55" width="100" height="36" rx="10" fill="#7c5cbf"/>
  <text x="330" y="79" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Pegada Digital</text>

  <!-- Eye lashes top -->
  <line x1="100" y1="95"  x2="110" y2="80"  stroke="#7c5cbf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="145" y1="72"  x2="148" y2="55"  stroke="#7c5cbf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="65"  x2="200" y2="48"  stroke="#7c5cbf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="255" y1="72"  x2="252" y2="55"  stroke="#7c5cbf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="300" y1="95"  x2="290" y2="80"  stroke="#7c5cbf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
