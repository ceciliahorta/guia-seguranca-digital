<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#fdf3e3"/>

  <!-- Camera body -->
  <rect x="90" y="100" width="220" height="148" rx="18" fill="#334155"/>
  <rect x="104" y="114" width="192" height="120" rx="12" fill="#475569"/>
  <!-- Shutter button -->
  <rect x="145" y="86" width="40" height="18" rx="9" fill="#334155"/>
  <!-- Flash -->
  <rect x="98" y="88" width="30" height="16" rx="4" fill="#334155"/>
  <rect x="100" y="90" width="26" height="12" rx="3" fill="#f1f5f9" opacity="0.4"/>

  <!-- Lens -->
  <circle cx="200" cy="174" r="48" fill="#0f172a"/>
  <circle cx="200" cy="174" r="38" fill="#1e293b"/>
  <circle cx="200" cy="174" r="28" fill="#334155"/>
  <circle cx="200" cy="174" r="20" fill="#3b7fd4" opacity="0.4"/>
  <circle cx="192" cy="166" r="7" fill="white" opacity="0.2"/>

  <!-- Warning triangle (overlay, top-right of camera) -->
  <g transform="translate(295,95)">
    <polygon points="0,-36 -36,28 36,28" fill="#e08a2c"/>
    <polygon points="0,-28 -29,23 29,23" fill="#fdf3e3" opacity="0.15"/>
    <text x="0" y="22" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">!</text>
  </g>

  <!-- Location pin (caution, top-left) -->
  <g transform="translate(85,75)">
    <circle r="18" fill="#e05555"/>
    <path d="M0 -10 C-7 -10 -7 -3 -7 -3 C-7 6 0 14 0 14 C0 14 7 6 7 -3 C7 -3 7 -10 0 -10 Z" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-3" r="3" fill="#e05555"/>
  </g>

  <!-- Metadata tag -->
  <rect x="95" y="228" width="210" height="32" rx="8" fill="#e08a2c" opacity="0.85"/>
  <text x="200" y="249" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Metadados revelam sua localização</text>

  <!-- X / no symbol -->
  <circle cx="84" cy="210" r="16" fill="#e05555" opacity="0.15"/>
  <line x1="76" y1="202" x2="92" y2="218" stroke="#e05555" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="92" y1="202" x2="76" y2="218" stroke="#e05555" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
