<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#e8f7f2"/>

  <!-- Clipboard -->
  <rect x="90" y="52" width="185" height="208" rx="12" fill="white" stroke="#2d9d78" stroke-width="3"/>
  <!-- Clip top -->
  <rect x="152" y="38" width="60" height="28" rx="8" fill="#2d9d78"/>
  <rect x="163" y="44" width="38" height="16" rx="5" fill="#e8f7f2"/>

  <!-- Checklist items -->
  <!-- Item 1 -->
  <circle cx="116" cy="110" r="11" fill="#2d9d78"/>
  <path d="M109 110 L113 115 L123 103" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="136" y1="110" x2="252" y2="110" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Item 2 -->
  <circle cx="116" cy="145" r="11" fill="#2d9d78"/>
  <path d="M109 145 L113 150 L123 138" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="136" y1="145" x2="252" y2="145" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Item 3 -->
  <circle cx="116" cy="180" r="11" fill="#2d9d78"/>
  <path d="M109 180 L113 185 L123 173" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="136" y1="180" x2="252" y2="180" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Item 4 (pending) -->
  <circle cx="116" cy="215" r="11" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="136" y1="215" x2="240" y2="215" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Family silhouette (right side) -->
  <!-- Parent left -->
  <circle cx="316" cy="145" r="18" fill="#2d9d78" opacity="0.7"/>
  <rect x="300" y="163" width="32" height="40" rx="10" fill="#2d9d78" opacity="0.7"/>
  <!-- Parent right -->
  <circle cx="348" cy="148" r="16" fill="#34b38a" opacity="0.7"/>
  <rect x="333" y="164" width="30" height="38" rx="10" fill="#34b38a" opacity="0.7"/>
  <!-- Child -->
  <circle cx="330" cy="163" r="13" fill="#e08a2c" opacity="0.9"/>
  <rect x="318" y="176" width="24" height="30" rx="8" fill="#e08a2c" opacity="0.9"/>

  <!-- Heart above family -->
  <g transform="translate(332,124)">
    <path d="M0 12 C0 12 -18 2 -18 -8 C-18 -16 -10 -20 0 -12 C10 -20 18 -16 18 -8 C18 2 0 12 0 12 Z" fill="#e05555" opacity="0.7"/>
  </g>
