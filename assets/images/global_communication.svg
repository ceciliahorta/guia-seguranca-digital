<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#e6f5f7"/>

  <!-- Globe -->
  <circle cx="185" cy="148" r="95" fill="#2196a6" opacity="0.15"/>
  <circle cx="185" cy="148" r="85" fill="none" stroke="#2196a6" stroke-width="3"/>
  <!-- Latitude lines -->
  <ellipse cx="185" cy="148" rx="85" ry="30" fill="none" stroke="#2196a6" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="185" cy="148" rx="85" ry="58" fill="none" stroke="#2196a6" stroke-width="1.5" opacity="0.3"/>
  <!-- Longitude line -->
  <line x1="185" y1="63" x2="185" y2="233" stroke="#2196a6" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="148" x2="270" y2="148" stroke="#2196a6" stroke-width="1.5" opacity="0.5"/>
  <!-- Continents suggestion -->
  <ellipse cx="162" cy="128" rx="28" ry="20" fill="#2196a6" opacity="0.35" transform="rotate(-15,162,128)"/>
  <ellipse cx="210" cy="162" rx="22" ry="16" fill="#2196a6" opacity="0.3" transform="rotate(10,210,162)"/>
  <ellipse cx="175" cy="170" rx="14" ry="10" fill="#2196a6" opacity="0.25"/>

  <!-- Chat bubble 1 (top-right) -->
  <g transform="translate(310,75)">
    <rect x="-38" y="-26" width="76" height="48" rx="12" fill="#2196a6"/>
    <polygon points="-10,22 -22,38 10,22" fill="#2196a6"/>
    <circle cx="-16" cy="0" r="5" fill="white"/>
    <circle cx="0"  cy="0" r="5" fill="white"/>
    <circle cx="16" cy="0" r="5" fill="white"/>
  </g>

  <!-- Chat bubble 2 (bottom-right) -->
  <g transform="translate(326,175)">
    <rect x="-34" y="-22" width="68" height="42" rx="10" fill="white" stroke="#2196a6" stroke-width="2"/>
    <polygon points="14,20 -4,35 -4,20" fill="white" stroke="#2196a6" stroke-width="2"/>
    <line x1="-20" y1="-5" x2="20" y2="-5" stroke="#2196a6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="7" x2="8" y2="7" stroke="#2196a6" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Person dots on globe -->
  <circle cx="155" cy="122" r="7" fill="#e08a2c"/>
  <circle cx="218" cy="158" r="7" fill="#2d9d78"/>
  <circle cx="178" cy="175" r="7" fill="#e05555"/>
  <line x1="155" y1="122" x2="218" y2="158" stroke="#2196a6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="218" y1="158" x2="178" y2="175" stroke="#2196a6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
</svg>
