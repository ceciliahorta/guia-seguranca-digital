<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#e8f7f2"/>

  <!-- Clock face (center) -->
  <circle cx="200" cy="148" r="95" fill="white" stroke="#2d9d78" stroke-width="5"/>
  <!-- Clock ticks -->
  <line x1="200" y1="58"  x2="200" y2="72"  stroke="#2d9d78" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="224" x2="200" y2="238" stroke="#2d9d78" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="108" y1="148" x2="122" y2="148" stroke="#2d9d78" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="278" y1="148" x2="292" y2="148" stroke="#2d9d78" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Diagonal ticks -->
  <line x1="135" y1="85"  x2="145" y2="95"  stroke="#2d9d78" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="265" y1="85"  x2="255" y2="95"  stroke="#2d9d78" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="135" y1="211" x2="145" y2="201" stroke="#2d9d78" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="265" y1="211" x2="255" y2="201" stroke="#2d9d78" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Clock hands -->
  <line x1="200" y1="148" x2="200" y2="85"  stroke="#334155" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="200" y1="148" x2="245" y2="148" stroke="#e08a2c" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="200" cy="148" r="7" fill="#334155"/>

  <!-- Moon (sleep icon, top-right outside clock) -->
  <g transform="translate(320,72)">
    <circle r="24" fill="#f0ebfa"/>
    <path d="M-4 -18 Q14 -14 14 0 Q14 14 -4 18 Q10 14 10 0 Q10 -14 -4 -18 Z" fill="#7c5cbf"/>
  </g>

  <!-- Eye with lines (eye strain, bottom-right) -->
  <g transform="translate(325,198)">
    <circle r="24" fill="#fdf3e3"/>
    <path d="M-18 0 Q0 -15 18 0 Q0 15 -18 0 Z" fill="none" stroke="#e08a2c" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="7" fill="#e08a2c" opacity="0.5"/>
    <line x1="-10" y1="-18" x2="-6" y2="-11" stroke="#e08a2c" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="-20" x2="0"  y2="-12" stroke="#e08a2c" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-18" x2="6"  y2="-11" stroke="#e08a2c" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Person stretching (bottom-left) -->
  <g transform="translate(68,210)">
    <circle r="22" fill="#e8f7f2"/>
    <circle cx="0" cy="-7" r="7" fill="#2d9d78"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="-16" y2="-3" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="16"  y2="-3" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="-10" y2="22" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="10"  y2="22" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <rect x="120" y="252" width="160" height="22" rx="8" fill="#2d9d78"/>
  <text x="200" y="268" font-size="11" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Telas off 1h antes de dormir</text>
</svg>
