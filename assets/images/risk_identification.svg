<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#fdf3e3"/>

  <!-- Laptop screen -->
  <rect x="100" y="80" width="200" height="130" rx="10" fill="#334155"/>
  <rect x="112" y="92" width="176" height="106" rx="6" fill="#f1f5f9"/>
  <rect x="70" y="210" width="260" height="14" rx="4" fill="#475569"/>

  <!-- Warning triangle on screen -->
  <polygon points="200,108 238,168 162,168" fill="#e08a2c"/>
  <polygon points="200,115 232,165 168,165" fill="#fdf3e3" opacity="0.2"/>
  <text x="200" y="157" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">!</text>

  <!-- Magnifying glass (overlapping, top-right) -->
  <g transform="translate(280,120)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#e05555" stroke-width="10"/>
    <circle cx="0" cy="0" r="30" fill="white" opacity="0.7"/>
    <line x1="28" y1="28" x2="52" y2="52" stroke="#e05555" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Suspicious signals -->
  <g transform="translate(50,140)">
    <rect x="-22" y="-20" width="44" height="40" rx="8" fill="#e05555" opacity="0.12"/>
    <text x="0" y="6" font-size="26" text-anchor="middle" font-family="Arial">🔗</text>
  </g>
  <g transform="translate(50,195)">
    <rect x="-22" y="-20" width="44" height="40" rx="8" fill="#e08a2c" opacity="0.12"/>
    <text x="0" y="6" font-size="26" text-anchor="middle" font-family="Arial">📧</text>
  </g>

  <!-- X mark on side -->
  <circle cx="335" cy="215" r="18" fill="#e05555"/>
  <line x1="325" y1="205" x2="345" y2="225" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="345" y1="205" x2="325" y2="225" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
