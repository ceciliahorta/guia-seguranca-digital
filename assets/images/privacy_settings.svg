<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="12" fill="#e6f5f7"/>

  <!-- Large gear -->
  <g transform="translate(165,148)">
    <!-- Gear teeth -->
    <rect x="-12" y="-82" width="24" height="24" rx="4" fill="#2196a6"/>
    <rect x="-12" y="58" width="24" height="24" rx="4" fill="#2196a6"/>
    <rect x="58" y="-12" width="24" height="24" rx="4" fill="#2196a6"/>
    <rect x="-82" y="-12" width="24" height="24" rx="4" fill="#2196a6"/>
    <rect x="38" y="-68" width="24" height="24" rx="4" fill="#2196a6" transform="rotate(45,50,-56)"/>
    <rect x="38" y="44" width="24" height="24" rx="4" fill="#2196a6" transform="rotate(-45,50,56)"/>
    <rect x="-62" y="-68" width="24" height="24" rx="4" fill="#2196a6" transform="rotate(-45,-50,-56)"/>
    <rect x="-62" y="44" width="24" height="24" rx="4" fill="#2196a6" transform="rotate(45,-50,56)"/>
    <circle r="68" fill="#2196a6"/>
    <circle r="48" fill="#e6f5f7"/>
    <!-- Lock inside gear -->
    <rect x="-18" y="2" width="36" height="28" rx="6" fill="#2196a6"/>
    <path d="M-12 2 L-12 -10 Q-12 -24 0 -24 Q12 -24 12 -10 L12 2" stroke="#2196a6" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="16" r="5" fill="#e6f5f7"/>
    <rect x="-3" y="16" width="6" height="8" rx="3" fill="#e6f5f7"/>
  </g>

  <!-- Settings sliders (right side) -->
  <g transform="translate(295,100)">
    <!-- Slider 1 -->
    <line x1="-30" y1="0" x2="70" y2="0" stroke="#2196a6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <circle cx="30" cy="0" r="10" fill="#2196a6"/>
    <text x="30" y="5" font-size="11" fill="white" text-anchor="middle" font-family="Arial">🔒</text>
    <!-- Slider 2 -->
    <line x1="-30" y1="40" x2="70" y2="40" stroke="#2196a6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <circle cx="55" cy="40" r="10" fill="#2196a6"/>
    <!-- Slider 3 -->
    <line x1="-30" y1="80" x2="70" y2="80" stroke="#2196a6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <circle cx="10" cy="80" r="10" fill="#2196a6"/>
  </g>

  <!-- Private badge -->
  <rect x="30" y="65" width="110" height="36" rx="10" fill="#2196a6"/>
  <text x="85" y="78" font-size="11" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">🔒 Perfil</text>
  <text x="85" y="92" font-size="11" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Privado</text>

  <!-- Check marks for settings done -->
  <circle cx="55" cy="175" r="14" fill="#2d9d78"/>
  <path d="M46 175 L52 182 L65 167" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="55" cy="210" r="14" fill="#2d9d78"/>
  <path d="M46 210 L52 217 L65 202" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
